<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.container{
    width:380px;
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.3);
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:white;
    color:#2575fc;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

p{
    text-align:center;
    color:white;
    margin-top:20px;
}

a{
    color:#fff;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Welcome Back</h2>

<form>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Login</button>
</form>

<p>Forgot Password?</p>

</div>

</body>
</html>
