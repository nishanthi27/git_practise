<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Verdana,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0f172a;
}

.login-box{
    width:400px;
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 30px cyan;
}

h1{
    text-align:center;
    color:cyan;
    margin-bottom:30px;
    text-transform:uppercase;
}

input{
    width:100%;
    padding:15px;
    margin:12px 0;
    background:#334155;
    color:white;
    border:2px solid transparent;
    border-radius:8px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:cyan;
    box-shadow:0 0 10px cyan;
}

button{
    width:100%;
    padding:15px;
    background:cyan;
    color:#111827;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    background:#22d3ee;
    box-shadow:0 0 20px cyan;
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.links a{
    color:cyan;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<div class="login-box">

<h1>Cyber Login</h1>

<form>

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<button>Sign In</button>

</form>

<div class="links">
<a href="#">Forgot Password?</a>
<a href="#">Create Account</a>
</div>

</div>

</body>
</html>
