<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.container{
    width:370px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.input-box input:focus{
    border-color:#2575fc;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#2575fc;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1b5fd9;
}

p{
    text-align:center;
    margin-top:18px;
}

a{
    text-decoration:none;
    color:#2575fc;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="container">
    <h2>Create Account</h2>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Confirm Password" required>
        </div>

        <button type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

</body>
</html>
